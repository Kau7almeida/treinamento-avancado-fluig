<!--
    04_exercicio_guiado_cadastro.html
    Sessão 03 — Exercício guiado: Cadastro de Funcionário
    Treinamento Avançado | JYNX

    INSTRUÇÃO: A turma constrói junto com o instrutor.
    Este é o GABARITO completo. O instrutor pode usar como referência
    enquanto vai construindo campo a campo com a turma.

    REQUISITOS DO EXERCÍCIO:
    ✓ 10 campos de 5+ tipos diferentes
    ✓ 3 painéis (Dados Pessoais, Profissionais, Observações)
    ✓ Grid com linhas de 2 e 3 colunas
    ✓ Validação com required + jQuery
    ✓ Helpers: data automática + usuário logado
    ✓ Todos os campos com name em snake_case
-->

<div class="fluig-style-guide" style="padding: 20px;">

    <!-- ALERTA inicial (remover na versão final) -->
    <div class="alert alert-info">
        <strong>Exercício Guiado:</strong> Cadastro de Funcionário —
        10 campos, 3 painéis, validação com jQuery.
    </div>

    <!-- PAINEL 1: Dados Pessoais -->
    <div class="panel panel-default">
        <div class="panel-heading">
            <h3 class="panel-title">Dados Pessoais</h3>
        </div>
        <div class="panel-body">
            <div class="row">
                <!-- 1. Nome (text, obrigatório) -->
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="nome_completo">
                            Nome Completo <span style="color:red">*</span>
                        </label>
                        <input type="text" class="form-control" id="nome_completo" name="nome_completo"
                            placeholder="Nome completo do funcionário" required>
                    </div>
                </div>
                <!-- 2. Email (email) -->
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="email_corporativo">E-mail Corporativo</label>
                        <input type="email" class="form-control" id="email_corporativo" name="email_corporativo"
                            placeholder="nome@empresa.com">
                    </div>
                </div>
            </div>
            <div class="row">
                <!-- 3. CPF (text + máscara) -->
                <div class="col-md-4">
                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" class="form-control" id="cpf" name="cpf" placeholder="000.000.000-00"
                            maxlength="14">
                    </div>
                </div>
                <!-- 4. Data Nascimento (date) -->
                <div class="col-md-4">
                    <div class="form-group">
                        <label for="data_nascimento">Data de Nascimento</label>
                        <input type="date" class="form-control" id="data_nascimento" name="data_nascimento">
                    </div>
                </div>
                <!-- 5. Telefone (text + máscara) -->
                <div class="col-md-4">
                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="text" class="form-control" id="telefone" name="telefone"
                            placeholder="(00) 00000-0000">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PAINEL 2: Dados Profissionais -->
    <div class="panel panel-default">
        <div class="panel-heading">
            <h3 class="panel-title">Dados Profissionais</h3>
        </div>
        <div class="panel-body">
            <div class="row">
                <!-- 6. Departamento (select) -->
                <div class="col-md-4">
                    <div class="form-group">
                        <label for="departamento">
                            Departamento <span style="color:red">*</span>
                        </label>
                        <select class="form-control" id="departamento" name="departamento" required>
                            <option value="">Selecione...</option>
                            <option value="TI">Tecnologia da Informação</option>
                            <option value="RH">Recursos Humanos</option>
                            <option value="FIN">Financeiro</option>
                            <option value="COM">Compras</option>
                            <option value="ADM">Administrativo</option>
                        </select>
                    </div>
                </div>
                <!-- 7. Cargo (text) -->
                <div class="col-md-4">
                    <div class="form-group">
                        <label for="cargo">Cargo</label>
                        <input type="text" class="form-control" id="cargo" name="cargo"
                            placeholder="Ex: Analista de Sistemas">
                    </div>
                </div>
                <!-- 8. Data Admissão (date, preenchida auto) -->
                <div class="col-md-4">
                    <div class="form-group">
                        <label for="data_admissao">Data de Admissão</label>
                        <input type="date" class="form-control" id="data_admissao" name="data_admissao">
                    </div>
                </div>
            </div>
            <div class="row">
                <!-- 9. Tipo de Contrato (radio) -->
                <div class="col-md-12">
                    <div class="form-group">
                        <label>Tipo de Contrato</label><br>
                        <label class="radio-inline">
                            <input type="radio" name="tipo_contrato" value="CLT" checked> CLT
                        </label>
                        <label class="radio-inline">
                            <input type="radio" name="tipo_contrato" value="PJ"> PJ
                        </label>
                        <label class="radio-inline">
                            <input type="radio" name="tipo_contrato" value="estagio"> Estágio
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PAINEL 3: Observações -->
    <div class="panel panel-default">
        <div class="panel-heading">
            <h3 class="panel-title">Observações</h3>
        </div>
        <div class="panel-body">
            <!-- 10. Observações (textarea) -->
            <div class="row">
                <div class="col-md-12">
                    <div class="form-group">
                        <label for="observacoes">Observações</label>
                        <textarea class="form-control" id="observacoes" name="observacoes" rows="4"
                            placeholder="Informações adicionais..."></textarea>
                    </div>
                </div>
            </div>
            <!-- Checkbox de aceite -->
            <div class="checkbox">
                <label>
                    <input type="checkbox" name="aceite_termos" value="S">
                    Declaro que as informações acima são verdadeiras
                </label>
            </div>
        </div>
    </div>

    <!-- BOTÕES -->
    <div class="row">
        <div class="col-md-12 text-right">
            <button type="button" class="btn btn-default">Cancelar</button>
            <button type="button" class="btn btn-primary" id="btn-salvar">
                Salvar Cadastro
            </button>
        </div>
    </div>

</div>

<script>
    $(document).ready(function () {
        // Data de admissão = hoje
        var hoje = new Date().toISOString().split('T')[0];
        $('#data_admissao').val(hoje);

        // Máscaras (se jQuery Mask disponível)
        if ($.fn.mask) {
            $('#cpf').mask('000.000.000-00');
            $('#telefone').mask('(00) 00000-0000');
        }

        // Validação ao salvar
        $('#btn-salvar').click(function () {
            var erros = [];

            if ($('#nome_completo').val().trim() === '') {
                erros.push('Nome Completo é obrigatório');
            }
            if ($('#departamento').val() === '') {
                erros.push('Selecione um Departamento');
            }
            if (!$('input[name="aceite_termos"]').is(':checked')) {
                erros.push('Aceite a declaração de veracidade');
            }

            if (erros.length > 0) {
                alert('Corrija os seguintes erros:\n\n- ' + erros.join('\n- '));
                return false;
            }
        });
    });
</script>
