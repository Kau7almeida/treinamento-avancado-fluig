<!--
    05_lista_dinamica.html
    Sessão 04 — Lista Dinâmica (adicionar/remover linhas)
    Treinamento Avançado | JYNX

    Lista dinâmica = tabela onde o usuário adiciona e remove linhas.
    Usa a convenção dos 3 underscores (___) para tabela filha.
    O Fluig cria a tabela filha automaticamente no banco.
-->

<div class="fluig-style-guide" style="padding: 20px;">

    <div class="panel panel-default">
        <div class="panel-heading">
            <h3 class="panel-title">
                Itens do Pedido
                <button type="button" class="btn btn-primary btn-sm pull-right" id="btn-adicionar">
                    + Adicionar Item
                </button>
            </h3>
        </div>
        <div class="panel-body">

            <table class="table table-striped table-hover" id="tabela-itens">
                <thead>
                    <tr>
                        <th style="width:5%">#</th>
                        <th style="width:35%">Descrição</th>
                        <th style="width:15%">Quantidade</th>
                        <th style="width:20%">Valor Unitário</th>
                        <th style="width:20%">Subtotal</th>
                        <th style="width:5%"></th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela">
                    <!-- Primeira linha (sempre presente) -->
                    <tr class="linha-item" data-linha="1">
                        <td class="num-linha">1</td>
                        <td>
                            <!-- CONVENÇÃO ___N : tabela filha -->
                            <input type="text" class="form-control input-sm" name="item_descricao___1"
                                placeholder="Descrição do item">
                        </td>
                        <td>
                            <input type="number" class="form-control input-sm campo-qtd" name="item_quantidade___1"
                                value="1" min="1">
                        </td>
                        <td>
                            <input type="text" class="form-control input-sm campo-valor" name="item_valor_unitario___1"
                                placeholder="0,00">
                        </td>
                        <td>
                            <input type="text" class="form-control input-sm campo-subtotal" name="item_subtotal___1"
                                readonly value="0,00">
                        </td>
                        <td>
                            <button type="button" class="btn btn-danger btn-xs btn-remover" title="Remover">
                                &#10005;
                            </button>
                        </td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="4" class="text-right">
                            <strong>Total Geral:</strong>
                        </td>
                        <td>
                            <input type="text" class="form-control input-sm" id="total_geral" name="total_geral"
                                readonly value="0,00" style="font-weight:bold; background:#FFF3E0;">
                        </td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>

        </div>
    </div>

</div>

<script>
    $(document).ready(function () {

        var contadorLinhas = 1;

        // =====================================================
        // ADICIONAR NOVA LINHA
        // =====================================================
        $('#btn-adicionar').click(function () {
            contadorLinhas++;

            var novaLinha = '<tr class="linha-item" data-linha="' + contadorLinhas + '">' +
                '<td class="num-linha">' + contadorLinhas + '</td>' +
                '<td>' +
                '<input type="text" class="form-control input-sm" ' +
                'name="item_descricao___' + contadorLinhas + '" ' +
                'placeholder="Descrição do item">' +
                '</td>' +
                '<td>' +
                '<input type="number" class="form-control input-sm campo-qtd" ' +
                'name="item_quantidade___' + contadorLinhas + '" ' +
                'value="1" min="1">' +
                '</td>' +
                '<td>' +
                '<input type="text" class="form-control input-sm campo-valor" ' +
                'name="item_valor_unitario___' + contadorLinhas + '" ' +
                'placeholder="0,00">' +
                '</td>' +
                '<td>' +
                '<input type="text" class="form-control input-sm campo-subtotal" ' +
                'name="item_subtotal___' + contadorLinhas + '" ' +
                'readonly value="0,00">' +
                '</td>' +
                '<td>' +
                '<button type="button" class="btn btn-danger btn-xs btn-remover" ' +
                'title="Remover">&#10005;</button>' +
                '</td>' +
                '</tr>';

            $('#corpo-tabela').append(novaLinha);
            reindexarLinhas();
        });

        // =====================================================
        // REMOVER LINHA
        // =====================================================
        $(document).on('click', '.btn-remover', function () {
            var totalLinhas = $('.linha-item').length;

            if (totalLinhas <= 1) {
                alert('O pedido precisa ter pelo menos 1 item.');
                return;
            }

            $(this).closest('tr').remove();
            reindexarLinhas();
            calcularTotalGeral();
        });

        // =====================================================
        // REINDEXAR LINHAS (após adicionar/remover)
        // =====================================================
        function reindexarLinhas() {
            $('.linha-item').each(function (index) {
                var num = index + 1;
                $(this).attr('data-linha', num);
                $(this).find('.num-linha').text(num);

                // Atualizar os names com o novo índice
                $(this).find('input[name^="item_descricao___"]')
                    .attr('name', 'item_descricao___' + num);
                $(this).find('input[name^="item_quantidade___"]')
                    .attr('name', 'item_quantidade___' + num);
                $(this).find('input[name^="item_valor_unitario___"]')
                    .attr('name', 'item_valor_unitario___' + num);
                $(this).find('input[name^="item_subtotal___"]')
                    .attr('name', 'item_subtotal___' + num);
            });

            contadorLinhas = $('.linha-item').length;
        }

        // =====================================================
        // CALCULAR SUBTOTAL (quantidade × valor)
        // =====================================================
        $(document).on('change keyup', '.campo-qtd, .campo-valor', function () {
            var $linha = $(this).closest('tr');

            var qtd = parseFloat($linha.find('.campo-qtd').val()) || 0;
            var valorStr = $linha.find('.campo-valor').val() || '0';

            // Converter formato brasileiro (1.234,56) para float
            var valor = parseFloat(valorStr.replace(/\./g, '').replace(',', '.')) || 0;

            var subtotal = qtd * valor;

            // Formatar como moeda brasileira
            $linha.find('.campo-subtotal').val(
                subtotal.toLocaleString('pt-BR', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                })
            );

            calcularTotalGeral();
        });

        // =====================================================
        // CALCULAR TOTAL GERAL
        // =====================================================
        function calcularTotalGeral() {
            var total = 0;

            $('.campo-subtotal').each(function () {
                var subtotalStr = $(this).val() || '0';
                var subtotal = parseFloat(subtotalStr.replace(/\./g, '').replace(',', '.')) || 0;
                total += subtotal;
            });

            $('#total_geral').val(
                total.toLocaleString('pt-BR', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                })
            );
        }

    });
</script>

<!--
    PONTOS CRÍTICOS:

    1. CONVENÇÃO ___N (3 underscores + número da linha)
       O Fluig reconhece automaticamente como tabela filha.
       item_descricao___1, item_descricao___2 = linhas 1 e 2
       da tabela filha "item".

    2. REINDEXAR após remover
       Se o usuário remove a linha 2 de 3, os names ficam
       ___1 e ___3 (pulando o 2). Precisa reindexar para ___1 e ___2.
       Sem isso, o Fluig pode não salvar corretamente.

    3. PELO MENOS 1 LINHA
       Não deixar o usuário remover todas as linhas.
       Formulário sem nenhum item não faz sentido de negócio.

    4. CÁLCULOS NO BROWSER
       Subtotal e total são calculados no JavaScript do browser.
       Se precisar validar no servidor, usar beforeTaskSave.

    5. FORMATO DE MOEDA
       O input recebe texto formatado (1.234,56).
       Ao processar no servidor, converter para float.
-->
